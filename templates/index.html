<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Ads Brain</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">ESGIQ</p>
        <h1>Google Ads Brain</h1>
        <p class="subtitle">
          Generate institutional Google Ads messaging, analyse buyer psychology,
          log performance, and learn what wording works.
        </p>
      </div>
      <button onclick="checkStatus()">Check API</button>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Generate Ads</h2>
        <label>Company</label>
        <input id="company" value="ESGIQ">

        <label>Audience</label>
        <input id="audience" value="institutional carbon investors">

        <label>Offer</label>
        <textarea id="offer">carbon risk intelligence for climate project diligence</textarea>

        <label>Goal</label>
        <textarea id="goal">generate high-trust Google Ads for carbon risk intelligence</textarea>

        <div class="buttons">
          <button onclick="generateAds()">Generate</button>
          <button class="secondary" onclick="generateImproved()">Generate Improved</button>
          <button class="secondary" onclick="psychology()">Psychology</button>
        </div>
      </div>

      <div class="card">
        <h2>Output</h2>
        <pre id="output">Ready.</pre>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Log Performance</h2>
        <label>Headline</label>
        <input id="log_headline" value="Detect Carbon Project Risk">

        <label>Description</label>
        <textarea id="log_description">Assess delivery and integrity risk before committing capital.</textarea>

        <label>Clicks</label>
        <input id="clicks" type="number" value="20">

        <label>Conversions</label>
        <input id="conversions" type="number" value="3">

        <label>Impressions</label>
        <input id="impressions" type="number" value="1000">

        <button onclick="logFeedback()">Log Feedback</button>
      </div>

      <div class="card">
        <h2>Analyse Learning Loop</h2>
        <p>See winning wording, weak wording, and next-generation guidance.</p>
        <button onclick="analyseFeedback()">Analyse Feedback</button>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
